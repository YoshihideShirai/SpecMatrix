<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpecMatrix</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
      body { font-family: sans-serif; margin: 2rem; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
      .muted { color: #555; }
      button { padding: 0.5rem 1rem; }
    </style>
  </head>
  <body>
    <h1>SpecMatrix Dashboard</h1>
    <p class="muted">Frontend: Django templates + HTMX</p>

    <section id="dashboard-summary" class="card">
      {% include "partials/dashboard_summary.html" %}
    </section>

    <button
      hx-get="{% url 'dashboard_summary' %}"
      hx-target="#dashboard-summary"
      hx-swap="outerHTML"
    >
      サマリー更新
    </button>
  </body>
</html>
